name: Strompreise täglich sammeln

on:
  schedule:
    - cron: '5 13 * * *'   # täglich 14:05 Uhr MEZ (13:05 UTC)
  workflow_dispatch:         # manueller Start jederzeit möglich

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Preise abrufen und speichern
        run: |
          python3 << 'EOF'
          import json, urllib.request, os
          from datetime import datetime, timezone, timedelta

          # Heute in MEZ
          mez = timezone(timedelta(hours=2))  # MESZ im Sommer
          now = datetime.now(mez)
          today = now.strftime('%Y-%m-%d')

          # aWATTar API abrufen
          url = 'https://api.awattar.de/v1/marketdata'
          with urllib.request.urlopen(url) as r:
              data = json.loads(r.read())

          # Heutige Stunden filtern
          hours = []
          for entry in data['data']:
              dt = datetime.fromtimestamp(entry['start_timestamp'] / 1000, tz=mez)
              if dt.strftime('%Y-%m-%d') == today:
                  hours.append({
                      'hour': dt.hour,
                      'raw': round(entry['marketprice'] / 10, 3)
                  })

          hours.sort(key=lambda x: x['hour'])

          # Bestehende Datei laden oder neu erstellen
          path = 'data/preise.json'
          os.makedirs('data', exist_ok=True)
          if os.path.exists(path):
              with open(path) as f:
                  db = json.load(f)
          else:
              db = {}

          # Heute eintragen (überschreibt falls schon vorhanden)
          db[today] = hours

          # Speichern
          with open(path, 'w') as f:
              json.dump(db, f, separators=(',', ':'))

          print(f"✓ {today}: {len(hours)} Stunden gespeichert")
          EOF

      - name: Daten committen
        run: |
          git config user.name "Strompreise Bot"
          git config user.email "bot@github.com"
          git add data/preise.json
          git diff --staged --quiet || git commit -m "Preise $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
