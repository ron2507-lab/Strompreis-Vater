name: Strompreise täglich sammeln

on:
  schedule:
    - cron: '5 13 * * *'   # täglich 14:05 Uhr MEZ (13:05 UTC)
  workflow_dispatch:         # manueller Start jederzeit möglich

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Preise abrufen und speichern
        run: |
          git pull --rebase origin main
          python3 << 'EOF'
          import json, urllib.request, os
          from datetime import datetime, timezone, timedelta

          mez = timezone(timedelta(hours=2))

          # aWATTar API abrufen
          url = 'https://api.awattar.de/v1/marketdata'
          with urllib.request.urlopen(url) as r:
              data = json.loads(r.read())

          # Alle Stunden aus der API nach Tag gruppieren
          by_day = {}
          for entry in data['data']:
              dt = datetime.fromtimestamp(entry['start_timestamp'] / 1000, tz=mez)
              day_str = dt.strftime('%Y-%m-%d')
              if day_str not in by_day:
                  by_day[day_str] = {}
              by_day[day_str][dt.hour] = round(entry['marketprice'] / 10, 3)

          # Bestehende Datei laden oder neu erstellen
          path = 'data/preise.json'
          os.makedirs('data', exist_ok=True)
          if os.path.exists(path):
              with open(path) as f:
                  db = json.load(f)
          else:
              db = {}

          # Stunden mergen (nicht überschreiben)
          for day_str, new_hours in by_day.items():
              existing = {h['hour']: h['raw'] for h in db.get(day_str, [])}
              existing.update(new_hours)  # neue Werte überschreiben alte
              db[day_str] = [{'hour': h, 'raw': existing[h]} for h in sorted(existing)]
              print(f"✓ {day_str}: {len(db[day_str])} Stunden gespeichert")

          # Speichern
          with open(path, 'w') as f:
              json.dump(db, f, separators=(',', ':'))

          EOF

      - name: Daten committen
        run: |
          git config user.name "Strompreise Bot"
          git config user.email "bot@github.com"
          git add data/preise.json
          git diff --staged --quiet || git commit -m "Preise $(date +'%Y-%m-%d')"
          git push
